<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">ProseLab logo</title>
  <desc id="desc">Purple rounded-square icon with a white ProseLab monogram combining a P, a 4, and a fountain pen nib.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#6f2dff"/>
      <stop offset="45%" stop-color="#43117b"/>
      <stop offset="100%" stop-color="#22052f"/>
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e166f"/>
      <stop offset="100%" stop-color="#2a073a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#100314" flood-opacity=".3"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="18" y="18" width="220" height="220" rx="40" fill="url(#bgGlow)" stroke="url(#frame)" stroke-width="5"/>
    <rect x="23" y="23" width="210" height="210" rx="36" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="4"/>
  </g>

  <g fill="none" stroke="#fff" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M96 72h45c23 0 41 18 41 41s-18 41-41 41h-29" stroke-width="16"/>
    <path d="M96 72v96c0 11-3 22-8 32l-10 21 22 27 20-27-8-20v-79" stroke-width="16"/>
    <path d="M122 86v56h34" stroke-width="15"/>
    <path d="M122 122l34-36v68" stroke-width="15"/>
    <path d="M102 153h50" stroke-width="15"/>
  </g>

  <g fill="#fff">
    <path d="M87 219l15 19 15-19-15-18-15 18z"/>
    <circle cx="102" cy="218" r="5"/>
    <path d="M99 223h6v17h-6z"/>
  </g>
</svg>
